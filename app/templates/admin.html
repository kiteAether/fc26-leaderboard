<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>FC26 Admin</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px;}
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #ffe600; }
    input { width: 70px; padding: 6px; }
    input.name { width: 180px; }
    .rowform { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .btn { padding: 6px 10px; cursor:pointer; }
    .topbar { display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
  <div class="topbar">
    <h2>Admin - Edit Leaderboard</h2>
    <a href="/">Back to Leaderboard</a>
  </div>

  <h3>Add Team</h3>
  <form class="rowform" method="post" action="/admin/add?key={{ key }}">
    <input class="name" name="name" placeholder="Team name" required />
    <button class="btn" type="submit">Add</button>
  </form>

  <h3 style="margin-top:20px;">Edit Teams</h3>
  <table>
    <thead>
      <tr>
        <th>Rank</th><th>Name</th><th>P</th><th>GD</th><th>PTS</th>
        <th>W</th><th>D</th><th>L</th><th>F</th><th>A</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for r in table %}
      <tr>
        <form method="post" action="/admin/update/{{ r.id }}?key={{ key }}">
          <td>{{ r.rank }}</td>
          <td><input class="name" name="name" value="{{ r.name }}" required /></td>
          <td>{{ r.p }}</td>
          <td>{{ r.gd }}</td>
          <td><b>{{ r.pts }}</b></td>
          <td><input name="w" type="number" value="{{ r.w }}" min="0" /></td>
          <td><input name="d" type="number" value="{{ r.d }}" min="0" /></td>
          <td><input name="l" type="number" value="{{ r.l }}" min="0" /></td>
          <td><input name="f" type="number" value="{{ r.f }}" min="0" /></td>
          <td><input name="a" type="number" value="{{ r.a }}" min="0" /></td>
          <td>
            <button class="btn" type="submit">Save</button>
        </form>
            <form method="post" action="/admin/delete/{{ r.id }}?key={{ key }}" style="display:inline;">
              <button class="btn" type="submit" onclick="return confirm('Delete this team?')">Delete</button>
            </form>
          </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
