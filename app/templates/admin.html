<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FC26 Admin</title>

<style>
:root{
--text:#fff;
--muted:#a7b0c3;
--line:rgba(255,255,255,.1);
--accent:#7fb3ff;
--danger:#ef4444;
--radius:16px;
--shadow:0 18px 50px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
min-height:100vh;

background:
linear-gradient(180deg,rgba(9,20,60,.55),rgba(5,14,28,.95)),
radial-gradient(1100px 700px at 12% 0%,rgba(58,130,246,.25),transparent 55%),
radial-gradient(850px 560px at 90% 78%,rgba(79,70,229,.15),transparent 48%),
url("/static/fc26_bg.jpg");

background-size:cover;
background-position:center;
}

.wrap{
max-width:1100px;
margin:auto;
padding:24px 16px 60px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.title{
display:flex;
flex-direction:column;
gap:6px;
}

h1{
margin:0;
font-size:24px;
font-weight:900;
background:linear-gradient(90deg,#fff,#8fb8ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
font-size:13px;
color:var(--muted);
}

.topActions{
display:flex;
gap:10px;
}

a{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--line);
background:rgba(255,255,255,.08);
}

.card{
background:linear-gradient(180deg,rgba(10,18,35,.75),rgba(10,18,35,.55));
border:1px solid var(--line);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
}

.section{
padding:14px;
border-bottom:1px solid var(--line);
background:rgba(17,24,39,.55);
}

.sectionHeader{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.section h2{
margin:0;
font-size:14px;
text-transform:uppercase;
color:var(--muted);
letter-spacing:.08em;
}

.bulkActions{
display:flex;
gap:10px;
}

.rowform{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:12px;
}

input{
background:rgba(255,255,255,.06);
border:1px solid var(--line);
color:#fff;
padding:10px 12px;
border-radius:12px;
outline:none;
width:90px;
}

input.name{width:260px}
input.url{width:360px}

input:focus{
border-color:rgba(127,179,255,.55);
box-shadow:0 0 0 3px rgba(127,179,255,.14);
}

.btn{
padding:10px 12px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.08);
color:#fff;
cursor:pointer;
font-weight:700;
}

.btn.primary{
background:rgba(127,179,255,.16);
border-color:rgba(127,179,255,.34);
}

.btn.danger{
background:rgba(239,68,68,.18);
border-color:rgba(239,68,68,.35);
}

.tablewrap{
overflow:auto;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
min-width:1000px;
}

thead th{
background:rgba(10,13,22,.92);
padding:12px 10px;
border-bottom:1px solid var(--line);
font-size:12px;
color:var(--muted);
text-transform:uppercase;
}

tbody td{
padding:12px 10px;
border-bottom:1px solid rgba(255,255,255,.08);
text-align:center;
}

tbody tr:hover{
background:rgba(255,255,255,.035);
}

td.left{text-align:left}

.rankBadge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:42px;
height:34px;
border-radius:999px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.05);
font-weight:900;
}

.actions{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}

.rowSaveForm{
display:inline;
}

.rowDeleteForm{
display:inline;
}
</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<div class="title">
<h1>Admin — Edit Leaderboard</h1>
<div class="sub">Update W/D/L/F/A. PTS auto calculated.</div>
</div>

<div class="topActions">
<a href="/">Back</a>
</div>
</div>


<div class="card">

<div class="section">
<h2>Add Team</h2>

<form class="rowform" method="post" action="/admin/add?key={{ key }}">
<input class="name" name="name" placeholder="Team / Player name" required>
<input class="url" name="avatar_url" placeholder="Avatar URL">
<button class="btn primary">Add</button>
</form>

</div>


<div class="section">

<div class="sectionHeader">

<h2>Edit Teams</h2>

<div class="bulkActions">

<form method="post" action="/admin/save-all?key={{ key }}">
<button class="btn primary">Save All</button>
</form>

<form method="post" action="/admin/clear-all?key={{ key }}">
<button class="btn danger" onclick="return confirm('Reset ALL stats to zero?')">
Clear All
</button>
</form>

</div>

</div>

</div>


<div class="tablewrap">

<form method="post" action="/admin/save-all?key={{ key }}">

<table>

<thead>
<tr>
<th>Rank</th>
<th style="text-align:left">Name + Avatar</th>
<th>P</th>
<th>GD</th>
<th>PTS</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>F</th>
<th>A</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for r in table %}

<tr>

<td>
<span class="rankBadge">{{ r.rank }}</span>
<input type="hidden" name="id" value="{{ r.id }}">
</td>

<td class="left">
<input class="name" name="name_{{r.id}}" value="{{r.name}}">
<input class="url" name="avatar_url_{{r.id}}" value="{{r.avatar_url or ''}}">
</td>

<td>{{ r.p }}</td>
<td>{{ r.gd }}</td>
<td>{{ r.pts }}</td>

<td><input type="number" name="w_{{r.id}}" value="{{r.w}}"></td>
<td><input type="number" name="d_{{r.id}}" value="{{r.d}}"></td>
<td><input type="number" name="l_{{r.id}}" value="{{r.l}}"></td>
<td><input type="number" name="f_{{r.id}}" value="{{r.f}}"></td>
<td><input type="number" name="a_{{r.id}}" value="{{r.a}}"></td>

<td class="actions">

<form class="rowSaveForm" method="post" action="/admin/update/{{r.id}}?key={{key}}">
<button class="btn">Save</button>
</form>

<form class="rowDeleteForm" method="post" action="/admin/delete/{{r.id}}?key={{key}}">
<button class="btn danger" onclick="return confirm('Delete this team?')">
Delete
</button>
</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</form>

</div>

</div>

</div>

</body>
</html>
