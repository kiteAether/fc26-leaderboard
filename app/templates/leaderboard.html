<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>FC26 Leaderboard</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    background:#0f1115;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.podium{
    display:flex;
    justify-content:space-around;
    margin-bottom:30px;
}

.player{
    text-align:center;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
}

.first{
    border:3px solid gold;
}

.second{
    border:3px solid silver;
}

.third{
    border:3px solid #cd7f32;
}

.player-name{
    font-size:14px;
    margin-top:8px;
}

.points{
    font-size:12px;
    color:#9be15d;
}

.list{
    margin-top:20px;
}

.row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#1b1e24;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

.rank{
    width:25px;
}

.team{
    flex:1;
}

.stats{
    font-size:12px;
    color:#9aa0a6;
}

.pts{
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>FC26 Leaderboard</h1>

<div class="podium">

{% for r in table[:3] %}

<div class="player">

<div class="avatar 
{% if r.rank == 1 %}first
{% elif r.rank == 2 %}second
{% elif r.rank == 3 %}third
{% endif %}">
{{ r.rank }}
</div>

<div class="player-name">
{{ r.name }}
</div>

<div class="points">
{{ r.pts }} pts
</div>

</div>

{% endfor %}

</div>

<div class="list">

{% for r in table %}

<div class="row">

<div class="rank">
{{ r.rank }}
</div>

<div class="team">
{{ r.name }}

<div class="stats">
W {{ r.w }} • D {{ r.d }} • L {{ r.l }} • GD {{ r.gd }}
</div>

</div>

<div class="pts">
{{ r.pts }}
</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
